name: Retro Reminder

on:
  workflow_dispatch:
  schedule:
    # 오후 5:23 KST (UTC 08:23) - 월~금
    # 정각 대신 23분에 두어 GitHub Actions 스케줄 큐 경합 회피
    - cron: '23 8 * * 1-5'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send retro reminder
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          USERS: "U05JEHXU4BW U05J5EZ01PY U068EBNPZT4 U08PCETN3GB"
        run: |
          MESSAGE="🌇 지금 당장 /retro 로 작업 기록 남겨주세요."

          for USER_ID in $USERS; do
            curl -s -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"channel\":\"$USER_ID\",\"text\":\"$MESSAGE\"}"
            echo ""
          done
